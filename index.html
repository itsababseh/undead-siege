<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UNDEAD SIEGE — Zombie Survival</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;font-family:'Courier New',monospace;cursor:crosshair;user-select:none;-webkit-user-select:none;touch-action:none;}
canvas{display:block;width:100%;height:100%;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#hud{position:absolute;bottom:20px;left:0;width:100%;display:flex;justify-content:space-between;align-items:flex-end;padding:0 30px;opacity:0;transition:opacity 0.5s;}
#hud.show{opacity:1;}
.hud-box{background:rgba(0,0,0,0.6);border:1px solid rgba(255,60,60,0.3);padding:10px 18px;border-radius:4px;color:#ddd;font-size:14px;text-shadow:0 0 8px rgba(255,0,0,0.3);}
.hud-box .label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.hud-box .value{font-size:28px;font-weight:bold;color:#ff4444;text-shadow:0 0 15px rgba(255,0,0,0.5);}
#round-display{position:absolute;top:20px;left:50%;transform:translateX(-50%);}
#round-display .value{font-size:22px;color:#ffcc00;text-shadow:0 0 15px rgba(255,200,0,0.5);}
#health-bar-container{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:200px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
#health-bar{width:100%;height:100%;background:linear-gradient(90deg,#ff2222,#ff4444);border-radius:3px;transition:width 0.3s;box-shadow:0 0 10px rgba(255,0,0,0.5);}
#weapon-info{text-align:right;}
#weapon-info .weapon-name{font-size:18px;color:#ffcc00;margin-bottom:2px;}
#weapon-info .ammo{font-size:24px;color:#fff;}
#points-display .value{color:#ffcc00 !important;text-shadow:0 0 15px rgba(255,200,0,0.5) !important;}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);pointer-events:all;transition:opacity 0.5s;}
#overlay.hidden{opacity:0;pointer-events:none;}
#overlay h1{font-size:clamp(36px,8vw,72px);color:#ff2222;text-shadow:0 0 30px rgba(255,0,0,0.6),0 0 60px rgba(255,0,0,0.3);margin-bottom:10px;letter-spacing:6px;}
#overlay .subtitle{font-size:clamp(12px,3vw,18px);color:#888;letter-spacing:4px;margin-bottom:40px;}
#overlay .start-btn{background:none;border:2px solid #ff4444;color:#ff4444;padding:16px 48px;font-size:18px;font-family:'Courier New',monospace;cursor:pointer;letter-spacing:4px;text-transform:uppercase;transition:all 0.3s;pointer-events:all;}
#overlay .start-btn:hover{background:#ff4444;color:#0a0a0a;box-shadow:0 0 30px rgba(255,68,68,0.4);}
#overlay .stats{margin-top:30px;color:#888;font-size:14px;line-height:2;}
#overlay .stats span{color:#ffcc00;}
#round-announce{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:clamp(28px,6vw,52px);color:#ff2222;text-shadow:0 0 40px rgba(255,0,0,0.8);opacity:0;pointer-events:none;letter-spacing:6px;white-space:nowrap;}
#buy-prompt{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:#ffcc00;text-shadow:0 0 10px rgba(255,200,0,0.5);opacity:0;pointer-events:none;letter-spacing:2px;text-align:center;}
#damage-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(255,0,0,0.4) 100%);transition:opacity 0.15s;}
#mobile-controls{display:none;position:absolute;bottom:20px;left:0;width:100%;padding:0 20px;justify-content:space-between;align-items:flex-end;pointer-events:none;}
.joystick-zone{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);pointer-events:all;position:relative;}
.joystick-knob{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.2);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
#shoot-btn{width:80px;height:80px;border-radius:50%;background:rgba(255,68,68,0.2);border:2px solid rgba(255,68,68,0.4);pointer-events:all;display:flex;align-items:center;justify-content:center;color:#ff4444;font-size:10px;letter-spacing:1px;}
@media(max-width:768px){
#mobile-controls{display:flex;}
#hud{bottom:160px;}
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
<div id="hud">
<div class="hud-box" id="points-display"><div class="label">Points</div><div class="value" id="points-val">0</div></div>
<div class="hud-box" id="round-display"><div class="label">Round</div><div class="value" id="round-val">1</div></div>
<div class="hud-box" id="weapon-info"><div class="weapon-name" id="weapon-name">Pistol</div><div class="ammo" id="ammo-val">8 / ∞</div></div>
</div>
<div id="health-bar-container" style="opacity:0;transition:opacity 0.5s;"><div id="health-bar"></div></div>
<div id="round-announce"></div>
<div id="buy-prompt"></div>
<div id="damage-overlay"></div>
<div id="overlay">
<h1>UNDEAD SIEGE</h1>
<div class="subtitle">SURVIVE THE HORDE</div>
<button class="start-btn" id="start-btn">ENLIST</button>
<div style="margin-top:20px;color:#666;font-size:12px;letter-spacing:2px;">WASD + MOUSE · R TO RELOAD · E TO BUY</div>
</div>
<div id="mobile-controls">
<div class="joystick-zone" id="move-stick"><div class="joystick-knob" id="move-knob"></div></div>
<div id="shoot-btn">FIRE</div>
<div class="joystick-zone" id="aim-stick"><div class="joystick-knob" id="aim-knob"></div></div>
</div>
</div>
<script>
// ═══════════════════════════════════════════
// UNDEAD SIEGE — Top-Down Zombie Survival
// ═══════════════════════════════════════════

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Audio synthesis ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx();}
function playSound(freq,type,dur,vol=0.3){
  ensureAudio();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxShoot(){playSound(800,'square',0.08,0.15);playSound(200,'sawtooth',0.12,0.2);}
function sfxShotgun(){playSound(150,'sawtooth',0.15,0.3);playSound(100,'square',0.2,0.2);}
function sfxHit(){playSound(300,'sine',0.1,0.15);}
function sfxKill(){playSound(120,'sawtooth',0.3,0.2);}
function sfxHurt(){playSound(200,'sawtooth',0.2,0.3);}
function sfxBuy(){playSound(600,'sine',0.1,0.2);setTimeout(()=>playSound(900,'sine',0.1,0.2),100);}
function sfxRound(){playSound(400,'sine',0.3,0.2);setTimeout(()=>playSound(600,'sine',0.3,0.2),200);setTimeout(()=>playSound(800,'sine',0.4,0.2),400);}
function sfxReload(){playSound(400,'square',0.05,0.1);setTimeout(()=>playSound(500,'square',0.05,0.1),150);}
function sfxEmpty(){playSound(1000,'square',0.03,0.1);}

// --- Resize ---
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// --- Game State ---
const STATE={MENU:0,PLAYING:1,ROUND_TRANSITION:2,GAME_OVER:3};
let state=STATE.MENU;
let camera={x:0,y:0,shake:0,shakeDecay:0.9};
let player,zombies,bullets,particles,floatingTexts,wallBuys,barriers;
let round,points,kills,zombiesRemaining,zombiesSpawned,maxZombiesAlive,spawnTimer;
let roundAnnounceTimer,gameOverTimer;
let keys={},mouseX=0,mouseY=0,mouseDown=false;
let lastTime=0,dt=0;

// --- Weapons ---
const WEAPONS={
  pistol:{name:'Pistol',damage:30,fireRate:250,magSize:8,reloadTime:1500,spread:0.04,bullets:1,speed:18,pierce:false,auto:false,ammo:Infinity,color:'#ffcc00'},
  smg:{name:'MP40',damage:25,fireRate:100,magSize:32,reloadTime:2200,spread:0.08,bullets:1,speed:20,pierce:false,auto:true,ammo:192,color:'#66ccff'},
  shotgun:{name:'Trench Gun',damage:60,fireRate:600,magSize:6,reloadTime:2800,spread:0.15,bullets:6,speed:16,pierce:false,auto:false,ammo:54,color:'#ff8844'},
  rifle:{name:'M1 Garand',damage:100,fireRate:400,magSize:8,reloadTime:2000,spread:0.02,bullets:1,speed:22,pierce:true,auto:false,ammo:96,color:'#88ff88'},
  lmg:{name:'MG42',damage:35,fireRate:70,magSize:75,reloadTime:4000,spread:0.1,bullets:1,speed:19,pierce:false,auto:true,ammo:375,color:'#ff66ff'}
};

// --- Map Layout ---
const MAP_W=2400,MAP_H=2000;
const WALLS=[];
const TILE=80;

function buildMap(){
  WALLS.length=0;
  // Outer walls
  WALLS.push({x:0,y:0,w:MAP_W,h:20});
  WALLS.push({x:0,y:MAP_H-20,w:MAP_W,h:20});
  WALLS.push({x:0,y:0,w:20,h:MAP_H});
  WALLS.push({x:MAP_W-20,y:0,w:20,h:MAP_H});
  // Inner structures — rooms and corridors
  // Central bunker
  WALLS.push({x:900,y:700,w:600,h:20});
  WALLS.push({x:900,y:700,w:20,h:300});
  WALLS.push({x:900,y:980,w:250,h:20});
  WALLS.push({x:1250,y:980,w:250,h:20});
  WALLS.push({x:1480,y:700,w:20,h:300});
  // Left wing
  WALLS.push({x:200,y:400,w:400,h:20});
  WALLS.push({x:200,y:400,w:20,h:400});
  WALLS.push({x:200,y:780,w:200,h:20});
  WALLS.push({x:500,y:500,w:20,h:300});
  // Right wing
  WALLS.push({x:1800,y:400,w:400,h:20});
  WALLS.push({x:2180,y:400,w:20,h:400});
  WALLS.push({x:2000,y:780,w:200,h:20});
  WALLS.push({x:1800,y:500,w:20,h:300});
  // Top corridor
  WALLS.push({x:700,y:200,w:20,h:300});
  WALLS.push({x:1680,y:200,w:20,h:300});
  // Bottom area
  WALLS.push({x:400,y:1300,w:500,h:20});
  WALLS.push({x:400,y:1300,w:20,h:300});
  WALLS.push({x:400,y:1580,w:500,h:20});
  WALLS.push({x:1500,y:1300,w:500,h:20});
  WALLS.push({x:1980,y:1300,w:20,h:300});
  WALLS.push({x:1500,y:1580,w:500,h:20});
  // Small cover spots
  WALLS.push({x:1100,y:1400,w:200,h:20});
  WALLS.push({x:1100,y:1400,w:20,h:150});
  WALLS.push({x:600,y:1000,w:150,h:20});
  WALLS.push({x:1700,y:1000,w:150,h:20});

  // Wall buys
  wallBuys=[
    {x:530,y:410,weapon:'smg',cost:1000,label:'MP40 [1000]'},
    {x:1790,y:410,weapon:'shotgun',cost:1500,label:'Trench Gun [1500]'},
    {x:910,y:990,weapon:'rifle',cost:2000,label:'M1 Garand [2000]'},
    {x:1500,y:1310,weapon:'lmg',cost:3000,label:'MG42 [3000]'},
  ];
  // Barriers (doors you can buy open)
  barriers=[
    {x:1150,y:980,w:100,h:20,cost:750,open:false,label:'Door [750]'},
    {x:580,y:700,w:20,h:100,cost:750,open:false,label:'Door [750]'},
    {x:1680,y:500,w:20,h:100,cost:1000,open:false,label:'Door [1000]'},
    {x:900,y:1100,w:100,h:20,cost:1250,open:false,label:'Door [1250]'},
  ];
}

// Spawn points (edges of map)
function getSpawnPoint(){
  const side=Math.floor(Math.random()*4);
  switch(side){
    case 0:return{x:Math.random()*MAP_W,y:30};
    case 1:return{x:Math.random()*MAP_W,y:MAP_H-30};
    case 2:return{x:30,y:Math.random()*MAP_H};
    case 3:return{x:MAP_W-30,y:Math.random()*MAP_H};
  }
}


// --- Init Game ---
function initGame(){
  buildMap();
  player={
    x:MAP_W/2,y:MAP_H/2,
    angle:0,radius:16,speed:3.2,
    health:100,maxHealth:100,
    weapon:'pistol',
    mag:WEAPONS.pistol.magSize,
    reserve:Infinity,
    reloading:false,reloadTimer:0,
    fireTimer:0,
    invincible:0,
    weapons:['pistol']
  };
  zombies=[];bullets=[];particles=[];floatingTexts=[];
  round=0;points=500;kills=0;
  zombiesRemaining=0;zombiesSpawned=0;maxZombiesAlive=0;spawnTimer=0;
  roundAnnounceTimer=0;gameOverTimer=0;
  barriers.forEach(b=>b.open=false);
  camera.shake=0;
  startRound();
}

function startRound(){
  round++;
  zombiesRemaining=Math.floor(4+round*2.5+Math.pow(round,1.15));
  zombiesSpawned=0;
  maxZombiesAlive=Math.min(Math.floor(6+round*1.5),30);
  spawnTimer=0;
  state=STATE.ROUND_TRANSITION;
  roundAnnounceTimer=2.5;
  sfxRound();
  document.getElementById('round-val').textContent=round;
  const el=document.getElementById('round-announce');
  el.textContent='ROUND '+round;
  el.style.opacity='1';
  el.style.transform='translate(-50%,-50%) scale(1.2)';
  setTimeout(()=>{el.style.transition='opacity 1s, transform 1s';el.style.opacity='0';el.style.transform='translate(-50%,-50%) scale(0.8)';},1800);
  setTimeout(()=>{el.style.transition='none';},3000);
}

// --- Player Functions ---
function switchWeapon(){
  if(player.weapons.length<2)return;
  const idx=player.weapons.indexOf(player.weapon);
  const next=player.weapons[(idx+1)%player.weapons.length];
  player.weapon=next;
  const w=WEAPONS[next];
  player.mag=w.magSize;
  player.reserve=next==='pistol'?Infinity:w.ammo;
  player.reloading=false;
  player.reloadTimer=0;
  updateWeaponHUD();
}

function updateWeaponHUD(){
  const w=WEAPONS[player.weapon];
  document.getElementById('weapon-name').textContent=w.name;
  document.getElementById('ammo-val').textContent=player.mag+' / '+(player.reserve===Infinity?'∞':player.reserve);
}

function startReload(){
  if(player.reloading)return;
  const w=WEAPONS[player.weapon];
  const maxReserve=player.weapon==='pistol'?Infinity:w.ammo;
  if(player.mag>=w.magSize)return;
  if(player.reserve<=0&&player.reserve!==Infinity)return;
  player.reloading=true;
  player.reloadTimer=w.reloadTime/1000;
  sfxReload();
}

function finishReload(){
  const w=WEAPONS[player.weapon];
  const need=w.magSize-player.mag;
  if(player.reserve===Infinity){
    player.mag=w.magSize;
  }else{
    const take=Math.min(need,player.reserve);
    player.mag+=take;
    player.reserve-=take;
  }
  player.reloading=false;
  player.reloadTimer=0;
  updateWeaponHUD();
}

function shoot(){
  if(player.reloading)return;
  if(player.fireTimer>0)return;
  const w=WEAPONS[player.weapon];
  if(player.mag<=0){sfxEmpty();startReload();return;}
  player.mag--;
  player.fireTimer=w.fireRate/1000;
  if(w.name==='Trench Gun')sfxShotgun();else sfxShoot();
  camera.shake=Math.min(camera.shake+3,8);
  // Muzzle flash particle
  const mx=player.x+Math.cos(player.angle)*24;
  const my=player.y+Math.sin(player.angle)*24;
  for(let i=0;i<4;i++){
    particles.push({x:mx,y:my,vx:Math.cos(player.angle)*3+rng(-1,1),vy:Math.sin(player.angle)*3+rng(-1,1),life:0.15,maxLife:0.15,size:rng(2,5),color:'#ffcc44',type:'spark'});
  }
  for(let b=0;b<w.bullets;b++){
    const spread=(Math.random()-0.5)*w.spread*2;
    const angle=player.angle+spread;
    bullets.push({x:mx,y:my,vx:Math.cos(angle)*w.speed,vy:Math.sin(angle)*w.speed,damage:w.damage,pierce:w.pierce,life:1.5,color:w.color,radius:w.bullets>1?2:3});
  }
  updateWeaponHUD();
  if(player.mag<=0)startReload();
}

function rng(a,b){return a+Math.random()*(b-a);}

// --- Zombie ---
function spawnZombie(){
  const p=getSpawnPoint();
  const hp=50+round*15+Math.random()*round*10;
  const spd=0.8+Math.min(round*0.08,2)+Math.random()*0.3;
  const dmg=10+Math.floor(round*2);
  const sz=14+Math.random()*6;
  const type=round>=5&&Math.random()<0.15?'runner':round>=8&&Math.random()<0.1?'brute':'normal';
  let z={x:p.x,y:p.y,health:hp,maxHealth:hp,speed:spd,damage:dmg,radius:sz,angle:0,attackTimer:0,type:type,stun:0,flash:0};
  if(type==='runner'){z.speed=spd*1.6;z.health=hp*0.6;z.radius=12;z.damage=dmg*0.7;}
  if(type==='brute'){z.speed=spd*0.5;z.health=hp*3;z.radius=22;z.damage=dmg*2;}
  zombies.push(z);
  zombiesSpawned++;
}

// --- Collision helpers ---
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function circleRect(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw));
  const ny=Math.max(ry,Math.min(cy,ry+rh));
  return Math.hypot(cx-nx,cy-ny)<cr;
}
function resolveCircleRect(obj,r,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(obj.x,rx+rw));
  const ny=Math.max(ry,Math.min(obj.y,ry+rh));
  const dx=obj.x-nx,dy=obj.y-ny;
  const d=Math.hypot(dx,dy);
  if(d<r&&d>0){const push=(r-d)/d;obj.x+=dx*push;obj.y+=dy*push;}
}
function getAllWalls(){
  const all=[...WALLS];
  barriers.forEach(b=>{if(!b.open)all.push(b);});
  return all;
}


// --- Update ---
function update(){
  if(state===STATE.ROUND_TRANSITION){
    roundAnnounceTimer-=dt;
    if(roundAnnounceTimer<=0){state=STATE.PLAYING;}
    return;
  }
  if(state===STATE.GAME_OVER){
    gameOverTimer-=dt;
    return;
  }
  if(state!==STATE.PLAYING)return;

  // Player movement
  let mx=0,my=0;
  if(keys['w']||keys['arrowup'])my=-1;
  if(keys['s']||keys['arrowdown'])my=1;
  if(keys['a']||keys['arrowleft'])mx=-1;
  if(keys['d']||keys['arrowright'])mx=1;
  if(mobileMove.active){mx=mobileMove.dx;my=mobileMove.dy;}
  const ml=Math.hypot(mx,my);
  if(ml>0){mx/=ml;my/=ml;}
  player.x+=mx*player.speed;
  player.y+=my*player.speed;

  // Player-wall collision
  const walls=getAllWalls();
  walls.forEach(w=>resolveCircleRect(player,player.radius,w.x,w.y,w.w,w.h));
  player.x=Math.max(player.radius+20,Math.min(MAP_W-player.radius-20,player.x));
  player.y=Math.max(player.radius+20,Math.min(MAP_H-player.radius-20,player.y));

  // Aim
  if(mobileAim.active){
    player.angle=Math.atan2(mobileAim.dy,mobileAim.dx);
  }else{
    const wx=mouseX-canvas.width/2+camera.x;
    const wy=mouseY-canvas.height/2+camera.y;
    player.angle=Math.atan2(wy-player.y,wx-player.x);
  }

  // Shooting
  player.fireTimer=Math.max(0,player.fireTimer-dt);
  player.invincible=Math.max(0,player.invincible-dt);
  if(player.reloading){
    player.reloadTimer-=dt;
    if(player.reloadTimer<=0)finishReload();
  }
  const w=WEAPONS[player.weapon];
  if(mouseDown||mobileShoot){
    if(w.auto)shoot();
    else if(!wasShooting)shoot();
  }
  wasShooting=mouseDown||mobileShoot;

  // Spawn zombies
  if(zombiesSpawned<zombiesRemaining){
    spawnTimer-=dt;
    if(spawnTimer<=0&&zombies.length<maxZombiesAlive){
      spawnZombie();
      spawnTimer=Math.max(0.3,2-round*0.1);
    }
  }

  // Update zombies
  for(let i=zombies.length-1;i>=0;i--){
    const z=zombies[i];
    z.flash=Math.max(0,z.flash-dt*6);
    z.stun=Math.max(0,z.stun-dt);
    if(z.stun>0)continue;

    // Pathfinding: move toward player (simple steering with avoidance)
    const dx=player.x-z.x,dy=player.y-z.y;
    const dd=Math.hypot(dx,dy);
    if(dd>0){
      z.angle=Math.atan2(dy,dx);
      // Separation from other zombies
      let sepX=0,sepY=0;
      for(let j=0;j<zombies.length;j++){
        if(i===j)continue;
        const oz=zombies[j];
        const sx=z.x-oz.x,sy=z.y-oz.y;
        const sd=Math.hypot(sx,sy);
        const minD=z.radius+oz.radius+4;
        if(sd<minD&&sd>0){
          const f=(minD-sd)/sd*0.5;
          sepX+=sx*f;sepY+=sy*f;
        }
      }
      const moveX=dx/dd+sepX*0.3;
      const moveY=dy/dd+sepY*0.3;
      const ml2=Math.hypot(moveX,moveY);
      if(ml2>0){
        z.x+=moveX/ml2*z.speed;
        z.y+=moveY/ml2*z.speed;
      }
    }

    // Zombie-wall collision
    walls.forEach(wl=>resolveCircleRect(z,z.radius,wl.x,wl.y,wl.w,wl.h));
    z.x=Math.max(z.radius+20,Math.min(MAP_W-z.radius-20,z.x));
    z.y=Math.max(z.radius+20,Math.min(MAP_H-z.radius-20,z.y));

    // Attack player
    if(dd<z.radius+player.radius+5){
      z.attackTimer-=dt;
      if(z.attackTimer<=0){
        if(player.invincible<=0){
          player.health-=z.damage;
          sfxHurt();
          camera.shake=Math.min(camera.shake+6,12);
          document.getElementById('damage-overlay').style.opacity='0.6';
          setTimeout(()=>document.getElementById('damage-overlay').style.opacity='0',150);
          if(player.health<=0){
            player.health=0;
            state=STATE.GAME_OVER;
            gameOverTimer=2;
            showGameOver();
          }
        }
        z.attackTimer=0.8;
      }
    }
  }

  // Update bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx;b.y+=b.vy;
    b.life-=dt;
    // Wall collision
    let hitWall=false;
    for(const wl of walls){
      if(circleRect(b.x,b.y,b.radius,wl.x,wl.y,wl.w,wl.h)){hitWall=true;break;}
    }
    if(b.life<=0||hitWall||b.x<0||b.x>MAP_W||b.y<0||b.y>MAP_H){
      if(hitWall){
        for(let j=0;j<3;j++)particles.push({x:b.x,y:b.y,vx:rng(-2,2),vy:rng(-2,2),life:0.3,maxLife:0.3,size:rng(1,3),color:'#ffaa44',type:'spark'});
      }
      bullets.splice(i,1);continue;
    }
    // Hit zombie
    for(let j=zombies.length-1;j>=0;j--){
      const z=zombies[j];
      if(dist(b,z)<b.radius+z.radius){
        z.health-=b.damage;
        z.flash=1;
        z.stun=0.1;
        sfxHit();
        points+=10;
        // Blood particles
        for(let k=0;k<5;k++){
          particles.push({x:z.x,y:z.y,vx:rng(-3,3),vy:rng(-3,3),life:0.5,maxLife:0.5,size:rng(2,5),color:'#cc2222',type:'blood'});
        }
        if(z.health<=0){
          killZombie(j);
        }
        if(!b.pierce){bullets.splice(i,1);break;}
        else b.damage*=0.7;
      }
    }
  }

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vx*=0.95;p.vy*=0.95;
    p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }

  // Update floating texts
  for(let i=floatingTexts.length-1;i>=0;i--){
    const ft=floatingTexts[i];
    ft.y-=40*dt;
    ft.life-=dt;
    if(ft.life<=0)floatingTexts.splice(i,1);
  }

  // Check round complete
  if(zombiesSpawned>=zombiesRemaining&&zombies.length===0){
    // Bonus points
    points+=round*100;
    floatingTexts.push({x:player.x,y:player.y-40,text:'+'+round*100+' ROUND BONUS',life:2,maxLife:2,color:'#ffcc00',size:18});
    startRound();
  }

  // Update HUD
  document.getElementById('points-val').textContent=points;
  const hpPct=Math.max(0,player.health/player.maxHealth*100);
  document.getElementById('health-bar').style.width=hpPct+'%';
  if(hpPct<30)document.getElementById('health-bar').style.background='linear-gradient(90deg,#ff0000,#ff2222)';
  else document.getElementById('health-bar').style.background='linear-gradient(90deg,#ff2222,#ff4444)';
  updateWeaponHUD();

  // Camera
  camera.x+=(player.x-camera.x)*0.1;
  camera.y+=(player.y-camera.y)*0.1;
  if(camera.shake>0.1){camera.shake*=camera.shakeDecay;}else{camera.shake=0;}

  // Buy prompts
  checkBuyPrompts();
}

let wasShooting=false;

function killZombie(idx){
  const z=zombies[idx];
  kills++;
  points+=z.type==='brute'?200:z.type==='runner'?80:60;
  sfxKill();
  floatingTexts.push({x:z.x,y:z.y-20,text:'+'+(z.type==='brute'?200:z.type==='runner'?80:60),life:1,maxLife:1,color:'#ffcc00',size:16});
  // Death particles
  const col=z.type==='brute'?'#884422':z.type==='runner'?'#44aa44':'#338833';
  for(let i=0;i<12;i++){
    particles.push({x:z.x,y:z.y,vx:rng(-4,4),vy:rng(-4,4),life:0.8,maxLife:0.8,size:rng(3,8),color:col,type:'blood'});
  }
  // Ground stain
  particles.push({x:z.x,y:z.y,vx:0,vy:0,life:15,maxLife:15,size:z.radius*1.5,color:'rgba(40,15,15,0.5)',type:'stain'});
  zombies.splice(idx,1);
}

// --- Buy System ---
function checkBuyPrompts(){
  const el=document.getElementById('buy-prompt');
  let found=false;
  // Wall buys
  for(const wb of wallBuys){
    if(dist(player,wb)<80){
      el.textContent='[E] '+wb.label;
      el.style.opacity='1';
      found=true;
      if(keys['e']&&!prevKeys['e']){
        if(points>=wb.cost&&!player.weapons.includes(wb.weapon)){
          points-=wb.cost;
          player.weapons.push(wb.weapon);
          player.weapon=wb.weapon;
          const wpn=WEAPONS[wb.weapon];
          player.mag=wpn.magSize;
          player.reserve=wpn.ammo;
          player.reloading=false;
          sfxBuy();
          floatingTexts.push({x:player.x,y:player.y-40,text:wpn.name+'!',life:1.5,maxLife:1.5,color:'#66ff66',size:20});
          updateWeaponHUD();
        }else if(player.weapons.includes(wb.weapon)){
          // Buy ammo
          if(points>=Math.floor(wb.cost/2)){
            const wpn=WEAPONS[wb.weapon];
            points-=Math.floor(wb.cost/2);
            player.reserve=wpn.ammo;
            sfxBuy();
            floatingTexts.push({x:player.x,y:player.y-40,text:'Max Ammo!',life:1,maxLife:1,color:'#66ff66',size:16});
          }
        }
      }
      break;
    }
  }
  // Barriers
  for(const br of barriers){
    if(br.open)continue;
    const bx=br.x+br.w/2,by=br.y+br.h/2;
    if(dist(player,{x:bx,y:by})<100){
      el.textContent='[E] '+br.label;
      el.style.opacity='1';
      found=true;
      if(keys['e']&&!prevKeys['e']){
        if(points>=br.cost){
          points-=br.cost;
          br.open=true;
          sfxBuy();
          floatingTexts.push({x:bx,y:by-20,text:'Door Opened!',life:1.5,maxLife:1.5,color:'#66ff66',size:18});
        }
      }
      break;
    }
  }
  if(!found)el.style.opacity='0';
}
let prevKeys={};


// --- Render ---
function render(){
  ctx.fillStyle='#111';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  const shakeX=camera.shake*(Math.random()-0.5)*2;
  const shakeY=camera.shake*(Math.random()-0.5)*2;
  ctx.translate(canvas.width/2-camera.x+shakeX,canvas.height/2-camera.y+shakeY);

  // Floor grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1;
  const startX=Math.floor((camera.x-canvas.width/2)/TILE)*TILE;
  const startY=Math.floor((camera.y-canvas.height/2)/TILE)*TILE;
  for(let x=startX;x<camera.x+canvas.width/2+TILE;x+=TILE){
    ctx.beginPath();ctx.moveTo(x,camera.y-canvas.height/2);ctx.lineTo(x,camera.y+canvas.height/2);ctx.stroke();
  }
  for(let y=startY;y<camera.y+canvas.height/2+TILE;y+=TILE){
    ctx.beginPath();ctx.moveTo(camera.x-canvas.width/2,y);ctx.lineTo(camera.x+canvas.width/2,y);ctx.stroke();
  }

  // Stain particles (under everything)
  particles.forEach(p=>{
    if(p.type!=='stain')return;
    const a=Math.min(1,p.life/p.maxLife);
    ctx.fillStyle=p.color;
    ctx.globalAlpha=a*0.5;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });

  // Walls
  const walls=getAllWalls();
  walls.forEach(w=>{
    ctx.fillStyle='#2a2a2a';
    ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.strokeStyle='rgba(255,100,100,0.15)';
    ctx.lineWidth=1;
    ctx.strokeRect(w.x,w.y,w.w,w.h);
  });

  // Barriers (closed)
  barriers.forEach(b=>{
    if(b.open)return;
    ctx.fillStyle='#553300';
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle='#ffcc00';
    ctx.lineWidth=2;
    ctx.strokeRect(b.x,b.y,b.w,b.h);
  });

  // Wall buy markers
  wallBuys.forEach(wb=>{
    ctx.save();
    ctx.strokeStyle='#ffcc00';
    ctx.lineWidth=2;
    ctx.shadowColor='#ffcc00';
    ctx.shadowBlur=10;
    ctx.strokeRect(wb.x-15,wb.y-15,30,30);
    ctx.fillStyle='#ffcc00';
    ctx.font='bold 10px Courier New';
    ctx.textAlign='center';
    ctx.fillText('$',wb.x,wb.y+4);
    ctx.restore();
  });

  // Zombies
  zombies.forEach(z=>{
    ctx.save();
    ctx.translate(z.x,z.y);
    ctx.rotate(z.angle);
    // Body
    const baseCol=z.type==='brute'?'#664422':z.type==='runner'?'#227733':'#335533';
    const col=z.flash>0?lerpColor(baseCol,'#ffffff',z.flash):baseCol;
    ctx.fillStyle=col;
    ctx.shadowColor=z.type==='runner'?'#44ff44':'#ff4444';
    ctx.shadowBlur=z.flash>0?20:8;
    ctx.beginPath();ctx.arc(0,0,z.radius,0,Math.PI*2);ctx.fill();
    // Eyes
    ctx.fillStyle='#ff2222';
    ctx.shadowColor='#ff0000';
    ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(z.radius*0.4,-z.radius*0.3,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(z.radius*0.4,z.radius*0.3,3,0,Math.PI*2);ctx.fill();
    // Arms
    ctx.strokeStyle=col;
    ctx.lineWidth=4;
    ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(z.radius*0.5,-z.radius*0.7);ctx.lineTo(z.radius+8,-z.radius*0.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(z.radius*0.5,z.radius*0.7);ctx.lineTo(z.radius+8,z.radius*0.5);ctx.stroke();
    ctx.shadowBlur=0;
    // Health bar
    if(z.health<z.maxHealth){
      const bw=z.radius*2;
      const hp=z.health/z.maxHealth;
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(-bw/2,-z.radius-10,bw,4);
      ctx.fillStyle=z.type==='brute'?'#ff8844':'#ff4444';
      ctx.fillRect(-bw/2,-z.radius-10,bw*hp,4);
    }
    ctx.restore();
  });

  // Bullets
  bullets.forEach(b=>{
    ctx.fillStyle=b.color;
    ctx.shadowColor=b.color;
    ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);ctx.fill();
    // Trail
    ctx.strokeStyle=b.color;
    ctx.globalAlpha=0.3;
    ctx.lineWidth=b.radius;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-b.vx*0.5,b.y-b.vy*0.5);ctx.stroke();
    ctx.globalAlpha=1;
  });
  ctx.shadowBlur=0;

  // Particles (non-stain)
  particles.forEach(p=>{
    if(p.type==='stain')return;
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=p.color;
    if(p.type==='spark'){
      ctx.shadowColor=p.color;ctx.shadowBlur=6;
    }
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  });

  // Player
  ctx.save();
  ctx.translate(player.x,player.y);
  ctx.rotate(player.angle);
  // Body
  ctx.fillStyle=player.invincible>0&&Math.floor(Date.now()/80)%2?'#ffffff':'#cccccc';
  ctx.shadowColor='#4488ff';
  ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(0,0,player.radius,0,Math.PI*2);ctx.fill();
  // Gun
  const w2=WEAPONS[player.weapon];
  ctx.fillStyle='#888';
  ctx.shadowBlur=0;
  const gunLen=player.radius+12;
  ctx.fillRect(player.radius-4,-3,gunLen-player.radius+8,6);
  // Eyes (visor)
  ctx.fillStyle='#4488ff';
  ctx.shadowColor='#4488ff';
  ctx.shadowBlur=8;
  ctx.fillRect(player.radius*0.3,-player.radius*0.35,6,player.radius*0.7);
  ctx.shadowBlur=0;
  ctx.restore();

  // Floating texts
  floatingTexts.forEach(ft=>{
    const a=ft.life/ft.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=ft.color;
    ctx.font='bold '+ft.size+'px Courier New';
    ctx.textAlign='center';
    ctx.shadowColor=ft.color;
    ctx.shadowBlur=10;
    ctx.fillText(ft.text,ft.x,ft.y);
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  });

  ctx.restore();

  // Reload indicator
  if(player.reloading){
    const w3=WEAPONS[player.weapon];
    const pct=1-player.reloadTimer/(w3.reloadTime/1000);
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(canvas.width/2-50,canvas.height/2+40,100,8);
    ctx.fillStyle='#ffcc00';
    ctx.fillRect(canvas.width/2-50,canvas.height/2+40,100*pct,8);
    ctx.fillStyle='#ffcc00';
    ctx.font='12px Courier New';
    ctx.textAlign='center';
    ctx.fillText('RELOADING',canvas.width/2,canvas.height/2+38);
  }
}

function lerpColor(a,b,t){
  const ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16);
  const ar=(ah>>16)&0xff,ag=(ah>>8)&0xff,ab=ah&0xff;
  const br2=(bh>>16)&0xff,bg=(bh>>8)&0xff,bb=bh&0xff;
  const rr=Math.round(ar+(br2-ar)*t);
  const rg=Math.round(ag+(bg-ag)*t);
  const rb=Math.round(ab+(bb-ab)*t);
  return '#'+((1<<24)+(rr<<16)+(rg<<8)+rb).toString(16).slice(1);
}

// Mobile touch controls
function setupMobileControls(){
  const moveZone=document.getElementById('move-stick');
  const moveKnob=document.getElementById('move-knob');
  const aimZone=document.getElementById('aim-stick');
  const aimKnob=document.getElementById('aim-knob');
  const shootBtn=document.getElementById('shoot-btn');

  function handleJoystick(zone,knob,state,e,touch){
    const rect=zone.getBoundingClientRect();
    const cx=rect.left+rect.width/2;
    const cy=rect.top+rect.height/2;
    const dx=touch.clientX-cx;
    const dy=touch.clientY-cy;
    const dist2=Math.hypot(dx,dy);
    const maxR=rect.width/2-10;
    const clamped=Math.min(dist2,maxR);
    const angle=Math.atan2(dy,dx);
    state.dx=Math.cos(angle)*(clamped/maxR);
    state.dy=Math.sin(angle)*(clamped/maxR);
    state.active=true;
    const kx=Math.cos(angle)*clamped;
    const ky=Math.sin(angle)*clamped;
    knob.style.transform=`translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;
  }

  moveZone.addEventListener('touchstart',e=>{
    e.preventDefault();ensureAudio();
    const t=e.changedTouches[0];mobileMove.id=t.identifier;
    handleJoystick(moveZone,moveKnob,mobileMove,e,t);
  },{passive:false});
  moveZone.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier===mobileMove.id)handleJoystick(moveZone,moveKnob,mobileMove,e,t);
    }
  },{passive:false});
  moveZone.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
      if(t.identifier===mobileMove.id){
        mobileMove.active=false;mobileMove.dx=0;mobileMove.dy=0;mobileMove.id=null;
        moveKnob.style.transform='translate(-50%,-50%)';
      }
    }
  });

  aimZone.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];mobileAim.id=t.identifier;
    handleJoystick(aimZone,aimKnob,mobileAim,e,t);
  },{passive:false});
  aimZone.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier===mobileAim.id)handleJoystick(aimZone,aimKnob,mobileAim,e,t);
    }
  },{passive:false});
  aimZone.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
      if(t.identifier===mobileAim.id){
        mobileAim.active=false;mobileAim.dx=0;mobileAim.dy=0;mobileAim.id=null;
        aimKnob.style.transform='translate(-50%,-50%)';
      }
    }
  });

  shootBtn.addEventListener('touchstart',e=>{e.preventDefault();ensureAudio();mobileShoot=true;},{passive:false});
  shootBtn.addEventListener('touchend',e=>{mobileShoot=false;});
}

// --- Game Loop ---
function gameLoop(time){
  dt=Math.min((time-lastTime)/1000,0.05);
  lastTime=time;
  update();
  render();
  requestAnimationFrame(gameLoop);
}

function startGame(){
  initGame();
  document.getElementById('hud').classList.add('show');
  document.getElementById('health-bar-container').style.opacity='1';
  const ov=document.getElementById('overlay');
  ov.classList.add('hidden');
  state=STATE.ROUND_TRANSITION;
}

// --- Boot ---
document.getElementById('start-btn').addEventListener('click',()=>{
  ensureAudio();
  startGame();
});

setupMobileControls();
lastTime=performance.now();
requestAnimationFrame(gameLoop);
